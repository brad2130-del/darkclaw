<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maple Creek — The Great Deku Tree</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080C08;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;font-family:Georgia,'Times New Roman',serif;
}
#wrap{position:relative;box-shadow:0 12px 60px rgba(0,0,0,.9)}
canvas{
  display:block;
  width:min(calc(100vw - 12px),1100px);
  aspect-ratio:1100/780;
  image-rendering:auto;
}
#bar{
  display:flex;align-items:center;justify-content:space-between;
  width:min(calc(100vw - 12px),1100px);
  padding:5px 12px;background:#06080605;border-top:1px solid #2A3A1A;
}
.bh{font-size:10px;color:#6B8050}
.bb{font-size:10px;color:#A0C070;background:none;border:1px solid #3A5020;
    padding:3px 12px;cursor:pointer;font-family:Georgia,serif;border-radius:3px;transition:all .15s}
.bb:hover{color:#C0E090;border-color:#7AB040}

/* ── Deku Tree Chat Overlay ─────────────────────────────── */
#chat-toggle{
  position:fixed;bottom:54px;right:calc((100vw - min(calc(100vw - 12px),1100px))/2 + 8px);
  z-index:50;
  background:#1A2A10;border:1px solid #3A5A20;border-radius:50%;
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;transition:all .2s;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
}
#chat-toggle:hover{background:#2A3A18;border-color:#5A8A30}
#chat-toggle.open{background:#5A8A30;border-color:#7AB040}

#chat-panel{
  position:fixed;
  bottom:100px;
  right:calc((100vw - min(calc(100vw - 12px),1100px))/2 + 8px);
  width:320px;
  max-height:420px;
  z-index:49;
  background:rgba(8,14,6,.95);
  border:1px solid #2A4A18;
  border-radius:10px;
  display:flex;flex-direction:column;
  box-shadow:0 8px 40px rgba(0,0,0,.8);
  transform:translateY(8px);opacity:0;pointer-events:none;
  transition:all .22s ease;
  backdrop-filter:blur(6px);
}
#chat-panel.open{transform:translateY(0);opacity:1;pointer-events:all}

#chat-panel-hdr{
  padding:8px 12px;
  border-bottom:1px solid #1A3010;
  display:flex;align-items:center;gap:8px;
  font-family:Georgia,serif;font-size:11px;color:#7AB050;
  flex-shrink:0;
}
#chat-panel-hdr span{flex:1}
#chat-clear{background:none;border:none;color:#3A5020;cursor:pointer;font-size:12px;padding:0 4px;}
#chat-clear:hover{color:#A0C060}

#chat-log{
  flex:1;overflow-y:auto;padding:10px 12px;
  display:flex;flex-direction:column;gap:7px;
  min-height:80px;max-height:270px;
  scrollbar-width:thin;scrollbar-color:#2A4A18 transparent;
}

.cmsg-user{
  align-self:flex-end;
  background:#1E3010;border:1px solid #2E4A18;
  border-radius:8px 8px 2px 8px;
  padding:6px 10px;font-size:11px;font-family:Georgia,serif;
  color:#C0D8A0;max-width:86%;word-break:break-word;line-height:1.5;
}
.cmsg-agent{
  align-self:flex-start;
  background:#0E180A;border:1px solid #1A2E10;
  border-radius:8px 8px 8px 2px;
  padding:6px 10px;font-size:11px;font-family:Georgia,serif;
  color:#A0C080;max-width:92%;word-break:break-word;line-height:1.55;
}
.cmsg-lbl{font-size:9px;color:#4A7030;margin-bottom:2px;font-family:Georgia,serif;}

#chat-input-row{
  display:flex;gap:5px;padding:8px 10px;
  border-top:1px solid #1A3010;flex-shrink:0;
}
#deku-input{
  flex:1;background:#0E180A;border:1px solid #1E3010;
  border-radius:5px;color:#C0D8A0;
  font-family:Georgia,serif;font-size:11px;
  padding:6px 9px;outline:none;resize:none;height:42px;line-height:1.4;
  transition:border-color .15s;
}
#deku-input:focus{border-color:#3A6020}
#deku-input::placeholder{color:#2E4A20}
#deku-send{
  background:#2A4A18;border:1px solid #3A6020;
  border-radius:5px;color:#90C060;
  font-family:Georgia,serif;font-size:10px;
  padding:0 12px;cursor:pointer;transition:all .15s;flex-shrink:0;
}
#deku-send:hover{background:#3A5A22;color:#B0E070}
#deku-send:disabled{opacity:.4;cursor:default}
#chat-hint{padding:3px 10px 6px;font-family:Georgia,serif;font-size:9px;color:#2A4A18;min-height:14px}
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="1100" height="780"></canvas></div>
<div id="bar">
  <span class="bh">✦ Maple Creek — The Great Deku Tree &nbsp;·&nbsp; ENTER demo &nbsp;·&nbsp; F fullscreen</span>
  <div style="display:flex;gap:8px">
    <button class="bb" onclick="triggerDemo()">▶ Demo</button>
    <button class="bb" onclick="toggleSS()">⛶</button>
  </div>
</div>

<!-- Chat toggle button -->
<button id="chat-toggle" onclick="toggleChat()" title="Chat with the Great Deku Tree">💬</button>

<!-- Chat panel -->
<div id="chat-panel">
  <div id="chat-panel-hdr">
    <span>✦ Speak to the Tree</span>
    <button id="chat-clear" onclick="clearChat()" title="Clear">✕</button>
  </div>
  <div id="chat-log">
    <div class="cmsg-agent">
      <div class="cmsg-lbl">The Great Deku Tree</div>
      The tree hears you, traveler. Ask anything, or type /fast · /plan · /return.
    </div>
  </div>
  <div id="chat-hint"></div>
  <div id="chat-input-row">
    <textarea id="deku-input" placeholder="Ask the tree…"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();dekuSend();}"></textarea>
    <button id="deku-send" onclick="dekuSend()">Send</button>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════
//  MAPLE CREEK — THE GREAT DEKU TREE
//  Cross-section view: 5 carved chambers inside an ancient tree.
//
//  Floor layout (top → bottom):
//    SKY / CANOPY      y:  0 –  70  (exterior: stars, moon, foliage)
//    THE STUDY         y: 70 – 200  Coder   — magical scripts & star charts
//    THE LOBBY         y:200 – 320  Rosie   — grand reception desk, flowers
//    THE LIBRARY       y:320 – 440  Kit+Sage— curved bookshelves, orb light
//    THE KITCHEN       y:440 – 570  Bea     — hearth, hanging herbs, cauldron
//    THE ROOT CHAMBER  y:570 – 700  Pip     — mossy stone, mushroom lanterns
//    GROUND / ROOTS    y:700 – 780  (soil, roots spreading outward)
//
//  BRANCH DECK  (right exterior, y≈100): Owl mail carrier.
//  Owl animates + hoots when a document is ingested.
// ═══════════════════════════════════════════════════════════════

const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 1100, H = 780;

// Tree trunk interior bounds
const TX1 = 275, TX2 = 825, TMID = 550;

// Floor Y definitions
const F = {
  sky:    { y:  0, h:  70 },
  study:  { y: 70, h: 130 },   // Coder
  lobby:  { y:200, h: 120 },   // Rosie
  lib:    { y:320, h: 120 },   // Kit + Sage
  kit:    { y:440, h: 130 },   // Bea
  roots:  { y:570, h: 130 },   // Pip
  ground: { y:700, h:  80 },
};

// Branch deck (right exterior)
const DECK_Y = 108, DECK_X1 = TX2, DECK_X2 = TX2 + 210;
const OWL_X = DECK_X2 - 35, OWL_Y = DECK_Y - 12;

let frame = 0;
const particles = [];
let dlg = { who:'', full:'', idx:0, timer:0 };

// Owl state
const owl = { flap:0, hoot:null, hootTimer:0 };

// Pre-seeded random stars (fixed positions, no flicker)
const STARS = Array.from({length:90},()=>({
  x: Math.random()*W, y: Math.random()*180,
  r: Math.random()*1.4+0.4,
  tw: Math.random()*Math.PI*2,
}));
// Pre-seeded fireflies (inside tree, drift upward)
const FLIES = Array.from({length:18},()=>({
  x: TX1+30+Math.random()*(TX2-TX1-60),
  y: 100+Math.random()*580,
  vy: -(0.15+Math.random()*0.25),
  ph: Math.random()*Math.PI*2,
}));
// Note rotations for bulletin board (pre-seeded)
const NROT = [0.03,-0.04,0.02,-0.05,0.01];

// ── Agent colors / names ─────────────────────────────────────
const COLORS={rosie:'#E8735A',kit:'#5B8DC8',sage:'#9B7BC8',
               bea:'#D4A020',coder:'#4A8A5A',pip:'#A08060'};
const NAMES ={rosie:'Rosie',kit:'Kit',sage:'Sage',
               bea:'Bea',coder:'Coder',pip:'Pip'};

function homeOf(id){return({
  rosie:{x:520,y:275}, kit:{x:390,y:390}, sage:{x:680,y:375},
  bea:{x:510,y:518},   coder:{x:550,y:148}, pip:{x:530,y:644},
})[id]||{x:550,y:400};}

function roomBoundsOf(id){
  const m=30;
  return({
    rosie:  {x1:TX1+m,x2:TX2-m,y1:215,y2:310},
    kit:    {x1:TX1+m,x2:TMID-20,y1:335,y2:428},
    sage:   {x1:TMID+20,x2:TX2-m,y1:335,y2:428},
    bea:    {x1:TX1+m,x2:TX2-m,y1:455,y2:558},
    coder:  {x1:TX1+m,x2:TX2-m,y1:85,y2:188},
    pip:    {x1:TX1+m,x2:TX2-m,y1:585,y2:688},
  })[id]||{x1:TX1+30,x2:TX2-30,y1:100,y2:650};
}

// Claude fast-mode indicator
let claudeMode = false;  // true when /fast is active
let claudeAura = null;   // {id, timer} — golden aura on the last Claude-backed agent

// Agents
const agents={};
['rosie','kit','sage','bea','coder','pip'].forEach(id=>{
  const h=homeOf(id);
  agents[id]={id,x:h.x,y:h.y,tx:h.x,ty:h.y,home:{...h},
    ph:Math.random()*Math.PI*2,speech:null,stimer:0,
    status:'idle',stattimer:0,color:COLORS[id],nm:Math.random()*200|0};
});

// ═══════════════════════════════════════════════════════════════
//  BACKGROUND: NIGHT FOREST + STARS
// ═══════════════════════════════════════════════════════════════
function drawBackground(){
  // Sky gradient
  const sg=ctx.createLinearGradient(0,0,0,F.ground.y);
  sg.addColorStop(0,'#04080F'); sg.addColorStop(0.4,'#071018');
  sg.addColorStop(1,'#0C1808');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,F.ground.y);

  // Stars (twinkle via alpha)
  for(const s of STARS){
    const a=0.5+0.5*Math.sin(frame*0.02+s.tw);
    ctx.fillStyle=`rgba(200,220,255,${a*0.9})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }

  // Moon
  ctx.fillStyle='rgba(220,230,180,0.9)';
  ctx.beginPath(); ctx.arc(90,48,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(200,210,150,0.3)';
  ctx.beginPath(); ctx.arc(90,48,38,0,Math.PI*2); ctx.fill();
  // Moon craters
  ctx.fillStyle='rgba(180,190,140,0.4)';
  [[78,42,5],[98,55,4],[85,58,3]].forEach(([cx,cy,r])=>{
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  });

  // Background forest silhouette
  ctx.fillStyle='#080E08';
  // Left forest
  for(let i=0;i<8;i++){
    const tx=i*34, th=90+Math.sin(i*2.7)*30;
    ctx.beginPath();
    ctx.moveTo(tx,F.ground.y); ctx.lineTo(tx+17,F.ground.y-th);
    ctx.lineTo(tx+34,F.ground.y); ctx.fill();
  }
  // Right forest
  for(let i=0;i<8;i++){
    const tx=DECK_X2+20+i*36, th=80+Math.cos(i*3.1)*25;
    ctx.beginPath();
    ctx.moveTo(tx,F.ground.y); ctx.lineTo(tx+18,F.ground.y-th);
    ctx.lineTo(tx+36,F.ground.y); ctx.fill();
  }

  // Ground / soil
  const gg=ctx.createLinearGradient(0,F.ground.y,0,H);
  gg.addColorStop(0,'#1A1208'); gg.addColorStop(1,'#0E0C06');
  ctx.fillStyle=gg; ctx.fillRect(0,F.ground.y,W,H-F.ground.y);

  // Grass tufts
  ctx.strokeStyle='#2A4A18'; ctx.lineWidth=2;
  for(let x=0;x<W;x+=14){
    if(x>TX1-40&&x<TX2+40) continue;
    ctx.beginPath(); ctx.moveTo(x,F.ground.y); ctx.lineTo(x+3,F.ground.y-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+5,F.ground.y); ctx.lineTo(x+7,F.ground.y-11); ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════════
//  TREE STRUCTURE: BARK, ROOTS, CANOPY, FLOOR SEPARATORS
// ═══════════════════════════════════════════════════════════════
function drawTreeStructure(){
  // ── Outer bark walls ─────────────────────────────────────────
  // Left bark
  ctx.fillStyle='#2A1608';
  ctx.fillRect(TX1-38,F.sky.y+40,38,F.ground.y-F.sky.y-40);
  // Right bark
  ctx.fillRect(TX2,F.sky.y+40,38,F.ground.y-F.sky.y-40);

  // Bark grain lines — left wall
  ctx.strokeStyle='#1E0F04'; ctx.lineWidth=1.5;
  for(let y=F.sky.y+60;y<F.ground.y;y+=22){
    ctx.beginPath();
    ctx.moveTo(TX1-38,y);
    ctx.bezierCurveTo(TX1-28,y+4,TX1-14,y-3,TX1,y);
    ctx.stroke();
  }
  // Bark grain lines — right wall
  for(let y=F.sky.y+60;y<F.ground.y;y+=22){
    ctx.beginPath();
    ctx.moveTo(TX2,y);
    ctx.bezierCurveTo(TX2+14,y+4,TX2+28,y-3,TX2+38,y);
    ctx.stroke();
  }

  // Inner bark edge (dark band at inner wall edges)
  ctx.fillStyle='#1A0C04';
  ctx.fillRect(TX1-4,F.sky.y+40,4,F.ground.y-F.sky.y-40);
  ctx.fillRect(TX2,F.sky.y+40,4,F.ground.y-F.sky.y-40);

  // ── Floor separators (thick tree-ring planks) ─────────────────
  const seps=[F.study.y,F.lobby.y,F.lib.y,F.kit.y,F.roots.y];
  seps.forEach(sy=>{
    ctx.fillStyle='#2A1608'; ctx.fillRect(TX1,sy,TX2-TX1,10);
    // Ring lines on separator
    ctx.strokeStyle='#3A2010'; ctx.lineWidth=1;
    [3,6].forEach(o=>{
      ctx.beginPath(); ctx.moveTo(TX1,sy+o); ctx.lineTo(TX2,sy+o); ctx.stroke();
    });
    // Shadow under separator
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(TX1,sy+10,TX2-TX1,8);
  });

  // ── Roots ─────────────────────────────────────────────────────
  ctx.strokeStyle='#3A2010'; ctx.lineWidth=18; ctx.lineCap='round';
  const rootCurves=[
    [TX1+60,F.ground.y, TX1+20,F.ground.y+30, TX1-40,F.ground.y+55, TX1-90,F.ground.y+70],
    [TX1+20,F.ground.y, TX1-30,F.ground.y+25, TX1-70,F.ground.y+60, TX1-110,F.ground.y+78],
    [TMID-60,F.ground.y, TMID-40,F.ground.y+28, TMID-20,F.ground.y+50, TMID-50,F.ground.y+76],
    [TMID+40,F.ground.y, TMID+30,F.ground.y+28, TMID+10,F.ground.y+55, TMID+60,F.ground.y+78],
    [TX2-30,F.ground.y, TX2+20,F.ground.y+30, TX2+60,F.ground.y+55, TX2+100,F.ground.y+72],
    [TX2-70,F.ground.y, TX2+10,F.ground.y+25, TX2+50,F.ground.y+58, TX2+95,F.ground.y+76],
  ];
  rootCurves.forEach(([x1,y1,cx1,cy1,cx2,cy2,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1);
    ctx.bezierCurveTo(cx1,cy1,cx2,cy2,x2||cx2+20,y2||cy2+10); ctx.stroke();
  });
  ctx.lineWidth=1; ctx.lineCap='butt';

  // ── Canopy / foliage ──────────────────────────────────────────
  const greens=['#0E2C0A','#16401A','#0C2808','#1A5020','#102E10','#204A18'];
  // Large overlapping leaf clusters
  const clusters=[
    [TMID-80,22,90],[TMID+60,18,80],[TMID-20,8,110],[TMID+30,30,85],
    [TMID-140,32,70],[TMID+150,28,65],[TMID-60,40,65],[TMID+100,40,60],
    [TX1+20,50,55],[TX2-20,48,55],[TMID,15,95],[TMID-30,50,50],
  ];
  clusters.forEach(([cx,cy,r],i)=>{
    ctx.fillStyle=greens[i%greens.length];
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  });
  // Lighter highlights on top
  ['#1A6025','#208030'].forEach((c,i)=>{
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(TMID+(i*40-20),10,50-i*10,0,Math.PI*2); ctx.fill();
  });
  // Fireflies in canopy
  if(frame%3===0){
    const ffy=20+Math.sin(frame*0.03)*15, ffx=TMID+Math.sin(frame*0.02)*150;
    ctx.fillStyle='rgba(180,255,80,0.6)';
    ctx.beginPath(); ctx.arc(ffx,ffy,1.5,0,Math.PI*2); ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════
//  BRANCH DECK + OWL MAIL CARRIER
// ═══════════════════════════════════════════════════════════════
function drawBranchDeck(){
  // Main branch
  ctx.strokeStyle='#3A2010'; ctx.lineWidth=24; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(TX2+4,DECK_Y+10);
  ctx.bezierCurveTo(TX2+60,DECK_Y+8,TX2+140,DECK_Y+18,DECK_X2+10,DECK_Y+20);
  ctx.stroke();
  // Branch highlight
  ctx.strokeStyle='#5A3818'; ctx.lineWidth=8;
  ctx.beginPath();
  ctx.moveTo(TX2+4,DECK_Y+5);
  ctx.bezierCurveTo(TX2+60,DECK_Y+3,TX2+140,DECK_Y+12,DECK_X2+10,DECK_Y+14);
  ctx.stroke();

  // Small twig branches
  ctx.strokeStyle='#3A2010'; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(TX2+80,DECK_Y+12); ctx.lineTo(TX2+70,DECK_Y-22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(TX2+130,DECK_Y+15); ctx.lineTo(TX2+145,DECK_Y-18); ctx.stroke();
  // Twig leaves
  ctx.fillStyle='#1A4810';
  [[TX2+64,DECK_Y-26,8],[TX2+74,DECK_Y-28,7],[TX2+140,DECK_Y-22,7],[TX2+150,DECK_Y-20,6]].forEach(([cx,cy,r])=>{
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  });

  // Deck platform (little wooden balcony)
  const dx=TX2+60, dw=150, dy=DECK_Y+18;
  ctx.fillStyle='#5A3818'; ctx.fillRect(dx,dy,dw,8);
  // Deck planks
  ctx.strokeStyle='#4A2A10'; ctx.lineWidth=1;
  for(let px=dx+20;px<dx+dw;px+=20){
    ctx.beginPath(); ctx.moveTo(px,dy); ctx.lineTo(px,dy+8); ctx.stroke();
  }
  // Fence posts
  ctx.strokeStyle='#4A2A10'; ctx.lineWidth=3;
  [dx+8,dx+40,dx+80,dx+120,dx+dw-8].forEach(px=>{
    ctx.beginPath(); ctx.moveTo(px,dy); ctx.lineTo(px,dy-16); ctx.stroke();
  });
  // Fence rail
  ctx.beginPath(); ctx.moveTo(dx+8,dy-14); ctx.lineTo(dx+dw-8,dy-14); ctx.stroke();

  // Mailbox / delivery basket
  const bx=dx+dw-46, by=dy-28;
  ctx.fillStyle='#8B4A20'; ctx.fillRect(bx,by,34,20);
  ctx.fillStyle='#C07030'; ctx.fillRect(bx+2,by+2,30,8);
  ctx.fillStyle='#3A2010'; ctx.fillRect(bx+14,by+8,6,12);
  // Maple leaf on box
  ctx.fillStyle='#C84020'; ctx.font='10px serif'; ctx.fillText('🍁',bx+8,by+12);

  // Label
  ctx.fillStyle='rgba(180,220,120,0.7)'; ctx.font='8px Georgia,serif';
  ctx.textAlign='center'; ctx.fillText('OWL POST',dx+dw/2,dy+20); ctx.textAlign='left';

  // Owl
  drawOwl(OWL_X, OWL_Y, owl.flap>0);
}

function drawOwl(x,y,flapping){
  // Body
  ctx.fillStyle='#8B6B3A';
  ctx.beginPath(); ctx.ellipse(x,y+2,14,20,0,0,Math.PI*2); ctx.fill();

  // Wings
  const wa = flapping ? Math.sin(frame*0.4)*0.6 : 0;
  ctx.fillStyle='#6B4A2A';
  ctx.save(); ctx.translate(x-12,y+4); ctx.rotate(-0.2+wa);
  ctx.beginPath(); ctx.ellipse(0,0,9,15,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(x+12,y+4); ctx.rotate(0.2-wa);
  ctx.beginPath(); ctx.ellipse(0,0,9,15,0,0,Math.PI*2); ctx.fill(); ctx.restore();

  // Belly
  ctx.fillStyle='#D4C090';
  ctx.beginPath(); ctx.ellipse(x,y+5,9,13,0,0,Math.PI*2); ctx.fill();
  // Belly spots
  ctx.fillStyle='rgba(160,120,60,0.3)';
  [[-3,2],[3,2],[0,-2],[0,7],[-3,9],[3,9]].forEach(([ox,oy])=>{
    ctx.beginPath(); ctx.arc(x+ox,y+oy,2,0,Math.PI*2); ctx.fill();
  });

  // Face disc

  });

  // Hoot speech bubble
  if(owl.hoot){

}

function rr(x,y,w,h,r){
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(x,y,w,h,r||0); else ctx.rect(x,y,w,h);
  ctx.closePath();
}

// Shared room fill with warm inner glow
function roomFill(y,h,col,glowCol,glowX,glowY){
  ctx.fillStyle=col; ctx.fillRect(TX1,y,TX2-TX1,h);
  if(glowCol){
    const g=ctx.createRadialGradient(glowX||TMID,glowY||y+h*0.5,0,glowX||TMID,glowY||y+h*0.5,200);
    g.addColorStop(0,glowCol); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(TX1,y,TX2-TX1,h);
  }
  // Room label (faint, top)
  ctx.fillStyle='rgba(255,220,150,0.18)'; ctx.font='10px Georgia,serif';
  ctx.textAlign='center'; ctx.fillText(arguments[6]||'',TMID,y+14); ctx.textAlign='left';
}

// ── Shared bookshelf ────────────────────────────────────────
const SPINES=['#B03030','#2858B8','#208850','#B07018','#6828B0',
              '#C03858','#188888','#A04818','#5060A0','#208870'];
function drawBookshelf(x,y,w,h,floorId){
  ctx.fillStyle='#2A1808'; ctx.fillRect(x,y,w,h);
  const shelves=Math.floor(h/36);
  for(let s=0;s<shelves;s++){
    const sy=y+6+s*36;
    ctx.fillStyle='#4A2A10'; ctx.fillRect(x+3,sy+28,w-6,5);
    let bx=x+4;
    for(let b=0;bx<x+w-6;b++){
      const bw=4+(b%3), bh=14+(b%5)*2;
      ctx.fillStyle=SPINES[(s*6+b)%SPINES.length];
      ctx.fillRect(bx,sy+28-bh,bw,bh);
      ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(bx+1,sy+28-bh,1,bh);
      bx+=bw+1;
    }
  }
  ctx.fillStyle='#1A0C04';
  ctx.fillRect(x,y,3,h); ctx.fillRect(x+w-3,y,3,h); ctx.fillRect(x,y,w,4);
}

// ── Fireflies (drifting upward through tree) ────────────────
function updateFireflies(){

//  SPEECH BUBBLES (on canvas)
// ═══════════════════════════════════════════════════════════════
function wrapText(text,maxW,font){
  ctx.save(); ctx.font=font||'13px Georgia,serif';
  const words=text.split(' '),lines=[];
  let cur='';
  for(const w of words){
    const t=cur?cur+' '+w:w;
    if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w;}
    else cur=t;
  }
  if(cur) lines.push(cur);
  ctx.restore(); return lines;
}
function speechBubble(x,y,text,color,alpha){
  if(!text||alpha<=0) return;
  const PAD=10,LH=18,MW=185,FONT='13px Georgia,serif';
  ctx.save(); ctx.globalAlpha=Math.min(1,alpha);
  const lines=wrapText(text,MW,FONT);
  const bw=MW+PAD*2, bh=lines.length*LH+PAD*2;
  let bx=x-bw/2, by=y-72-bh;
  bx=Math.max(TX1+4,Math.min(TX2-bw-4,bx));
  by=Math.max(4,by);
  rr(bx,by,bw,bh,8); ctx.fillStyle='#FFF9F0'; ctx.fill();
  ctx.strokeStyle=color; ctx.lineWidth=2; rr(bx,by,bw,bh,8); ctx.stroke();
  const tx=Math.max(bx+14,Math.min(bx+bw-14,x));
  ctx.fillStyle='#FFF9F0';
  ctx.beginPath(); ctx.moveTo(tx-7,by+bh); ctx.lineTo(tx,by+bh+12); ctx.lineTo(tx+7,by+bh); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=color; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(tx-7,by+bh); ctx.lineTo(tx,by+bh+12); ctx.lineTo(tx+7,by+bh); ctx.stroke();
  ctx.strokeStyle='#FFF9F0'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(tx-6,by+bh); ctx.lineTo(tx+6,by+bh); ctx.stroke();
  ctx.fillStyle='#3D2010'; ctx.font=FONT; ctx.textBaseline='top';
  lines.forEach((l,i)=>ctx.fillText(l,bx+PAD,by+PAD+i*LH));
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
function burst(x,y,col,n){
  for(let i=0;i<(n||8);i++){
    const a=Math.random()*Math.PI*2, s=0.5+Math.random()*2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,
      col,life:40+Math.random()*30|0,max:60,sz:2+Math.random()*3});
  }
}
function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life/p.max; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ═══════════════════════════════════════════════════════════════
function randTarget(id){
  const b=roomBoundsOf(id);
  return{x:b.x1+Math.random()*(b.x2-b.x1)|0, y:b.y1+Math.random()*(b.y2-b.y1)|0};
}
function updateAgents(){
  const SPD=0.38;
  for(const [id,ag] of Object.entries(agents)){
    ag.nm--;
    if(ag.nm<=0){
      const t=Math.random()<0.5?randTarget(id):homeOf(id);
      ag.tx=t.x; ag.ty=t.y; ag.nm=220+Math.random()*300|0;
    }
    const dx=ag.tx-ag.x, dy=ag.ty-ag.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>2){const s=id==='pip'?SPD*1.4:SPD; ag.x+=dx/dist*s; ag.y+=dy/dist*s;}
    if(ag.stimer>0){ag.stimer-=16; if(ag.stimer<=0){ag.speech=null;ag.stimer=0;}}
    if(ag.stattimer>0){ag.stattimer-=16; if(ag.stattimer<=0){ag.status='idle';ag.stattimer=0;}}
  }
  if(dlg.timer>0){dlg.timer-=16; if(dlg.idx<dlg.full.length&&frame%2===0) dlg.idx++;}
  // Owl flap
  if(owl.flap>0) owl.flap-=16;
  if(owl.hootTimer>0){owl.hootTimer-=16; if(owl.hootTimer<=0)owl.hoot=null;}
  updateFireflies();
}

function handleEvent(type,aid,data){

      owlPost('New scroll! 📜');
      burst(TX2+120,DECK_Y-30,'#C0E080',8);
      say('kit','The owl brought a new document! Filing it now.',4000);
      setTimeout(()=>say('sage','Cross-referencing with existing knowledge...',3500),1500);
    } else {
      burst(agents.sage.x,agents.sage.y-20,'#40C060',6);
      burst(agents.kit.x,agents.kit.y-20,'#5B8DC8',4);
      agents.sage.status='working'; agents.sage.stattimer=3000;
      say('kit',pick(DL.kit.mem),3500);
      setTimeout(()=>say('sage',pick(DL.sage.teach),3500),1200);
    }
  }
  else if(type==='memory.query'||type==='memory.hit'){
    burst(agents.sage.x,agents.sage.y-20,'#9B7BC8',5);
    agents.sage.status='working'; agents.sage.stattimer=2000;
  }
  else if(type==='agent.task.start'){
    const a=agents[aid]||agents.rosie;
    a.status='working'; a.stattimer=4000;
    say(aid||'rosie',pick((DL[aid]||DL.bea).busy||DL.bea.busy),3000);
  }
  else if(type==='agent.task.done'){
    const a=agents[aid]||agents.rosie;
    burst(a.x,a.y-20,'#80C8F0',8); a.status='idle';
    // If this was a Claude model response, show golden aura
    if(data.model&&data.model.startsWith('claude-')){
      claudeAura={id:aid||'rosie',timer:4000};
      burst(a.x,a.y-30,'#FFD040',10); burst(a.x,a.y-30,'#FFF0A0',6);
    }
    say(aid||'rosie',pick((DL[aid]||DL.rosie).task||DL.rosie.task),3000);
  }
  else if(type==='heal.triggered'){
    const a=agents[aid]||agents.pip;
    a.status='healing'; a.stattimer=6000;
    agents.pip.status='working'; agents.pip.stattimer=5000;
    agents.pip.tx=a.x; agents.pip.ty=a.y;
    burst(agents.pip.x,agents.pip.y,'#E86868',10);
    say('pip',pick(DL.pip.warn),4000);
  }
  else if(type==='heal.success'){
    const a=agents[aid]||agents.pip;
    a.status='idle'; agents.pip.status='idle';
    burst(a.x,a.y-20,'#80E090',10); burst(a.x,a.y-20,'#D4A820',6);
    say('pip',pick(DL.pip.ok),3500);
  }
  else if(type==='teach.win'){
    burst(agents.sage.x,agents.sage.y-20,'#A0E040',10);
    burst(agents.sage.x,agents.sage.y-20,'#C0B0F0',6);
    say('sage',pick(DL.sage.teach),4000);
  }
  else if(type==='system.start'){
    const msg=data.msg||'';
    if(msg==='fast-mode-on'){
      claudeMode=true;
      burst(agents.rosie.x,agents.rosie.y-30,'#FFD040',12);
      say('rosie','⚡ Fast mode — Claude is now in command!',4000);
    } else if(msg==='fast-mode-off'){
      claudeMode=false; claudeAura=null;
      say('rosie','🌿 Returned to local models.',3500);
    } else {
      say('rosie','The Great Deku Tree is open — welcome, traveler!',4500);
    }
  }
  else if(type==='health.ok'){
    agents.pip.status='idle';
  }
}

function tryWS(){
  try{
    const p=location.protocol==='https:'?'wss:':'ws:';
    const ws=new WebSocket(`${p}//${location.host}/ws`);
    ws.onopen=()=>{say('pip','Connected to Darkclaw — the tree awakens!',3500);};
    ws.onmessage=e=>{try{const ev=JSON.parse(e.data);handleEvent(ev.type,ev.agent_id,ev.data||{});}catch(_){}};
    ws.onclose=()=>setTimeout(tryWS,5000);
  }catch(_){}
}

//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop(){
  frame++;
  ctx.clearRect(0,0,W,H);
  ctx.textBaseline='alphabetic';

  drawBackground();
  drawTreeStructure();

  // Room interiors (bottom-up so lower floors paint first)
  drawRoots();
  drawKitchen();
  drawLibrary();
  drawLobby();
  drawStudy();

  drawBranchDeck();
  drawFireflies();
  drawParticles();

  // Agents Y-sorted
  const sorted=Object.values(agents).sort((a,b)=>a.y-b.y);
  sorted.forEach(drawAgent);
  sorted.forEach(ag=>{
    if(ag.speech&&ag.stimer>0)
      speechBubble(ag.x,ag.y-35,ag.speech,ag.color,Math.min(1,ag.stimer/400));
  });

  drawDialog();
  drawHUD();
  drawFastModeBanner();   // overlays HUD if /fast is active
  // Tick claude aura timer
  if(claudeAura&&claudeAura.timer>0) claudeAura.timer-=16;
  updateAgents();
  requestAnimationFrame(loop);
}

loop();
setTimeout(()=>say('rosie','Welcome to the Great Deku Tree! The inn is always open.',4500),1000);
tryWS();

  if(e.key==='Enter'&&document.activeElement.id!=='deku-input') triggerDemo();
  if(e.key==='f'||e.key==='F') toggleSS();

});

// ── Deku Tree Chat ───────────────────────────────────────────────

let _chatOpen=false, _chatBusy=false;

function toggleChat(){
  _chatOpen=!_chatOpen;
  document.getElementById('chat-panel').classList.toggle('open',_chatOpen);
  document.getElementById('chat-toggle').classList.toggle('open',_chatOpen);
  document.getElementById('chat-toggle').textContent=_chatOpen?'✕':'💬';
  if(_chatOpen) setTimeout(()=>document.getElementById('deku-input').focus(),220);
}

function clearChat(){
  document.getElementById('chat-log').innerHTML=`
    <div class="cmsg-agent">
      <div class="cmsg-lbl">The Great Deku Tree</div>
      The branches are quiet once more. What do you seek?
    </div>`;
}

async function dekuSend(){
  if(_chatBusy) return;
  const inp=document.getElementById('deku-input');
  const msg=inp.value.trim(); if(!msg) return;
  inp.value=''; _chatBusy=true;
  document.getElementById('deku-send').disabled=true;

  const log=document.getElementById('chat-log');
  const hint=document.getElementById('chat-hint');

  // User bubble
  const uEl=document.createElement('div'); uEl.className='cmsg-user';
  uEl.textContent=msg; log.appendChild(uEl); log.scrollTop=log.scrollHeight;

  // Agent bubble
  const aEl=document.createElement('div'); aEl.className='cmsg-agent';
  const lbl=document.createElement('div'); lbl.className='cmsg-lbl'; lbl.textContent='…';
  const txt=document.createElement('span'); txt.textContent='▋';
  aEl.appendChild(lbl); aEl.appendChild(txt); log.appendChild(aEl);
  log.scrollTop=log.scrollHeight;
  hint.textContent='Routing through the roots…';

  // Rosie walks to desk
  if(agents.rosie) { agents.rosie.status='working'; agents.rosie.stattimer=5000; }

  try {
    const resp=await fetch('/stream',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({task:msg})
    });
    const reader=resp.body.getReader(), dec=new TextDecoder();
    let buf='', text='', started=false;
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        let ev; try{ev=JSON.parse(line.slice(6));}catch{continue;}
        if(ev.type==='meta'){
          const aid=ev.agent_id||'rosie';
          lbl.textContent=ev.model&&ev.model.startsWith('claude-')?`${aid} ⚡`:aid+' ♥';
          hint.textContent=`${aid} → ${(ev.model||'').replace('ollama/','')}`;
          // Make the responding agent say something on canvas
          if(agents[aid]) { agents[aid].status='working'; agents[aid].stattimer=4000; }
        } else if(ev.type==='token'){
          if(!started){txt.textContent='';text='';started=true;}
          text+=ev.text; txt.textContent=text+'▋'; log.scrollTop=log.scrollHeight;
        } else if(ev.type==='done'){
          txt.textContent=text; hint.textContent='';
          // Make agent say a short version on canvas
          const aid=ev.agent_id||'rosie';
          if(agents[aid]) {
            say(aid, text.slice(0,60)+(text.length>60?'…':''), 4000);
            agents[aid].status='idle';
          }
        } else if(ev.type==='error'){
          txt.style.color='#A06040'; txt.textContent='The tree speaks not: '+ev.error;
          hint.textContent='';
        }
      }
    }
  } catch(e){
    txt.style.color='#A06040'; txt.textContent='The roots are silent: '+e.message;
    hint.textContent='';
  } finally {
    _chatBusy=false;
    document.getElementById('deku-send').disabled=false;
  }
}
</script>
