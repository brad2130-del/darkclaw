<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maple Creek Woodland Hotel — Darkclaw</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#1A1008;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  font-family:Georgia,'Times New Roman',serif;
}
#wrap{position:relative;box-shadow:0 8px 48px rgba(0,0,0,.7);border:3px solid #6B4C2E}
canvas{
  display:block;
  width:min(calc(100vw - 16px),1100px);
  aspect-ratio:1100/680;
  image-rendering:auto;
}
#bar{
  display:flex;align-items:center;justify-content:space-between;
  width:min(calc(100vw - 16px),1100px);
  padding:6px 12px;background:#120C04;border-top:2px solid #4A3020;
}
.bh{font-size:11px;color:#8B7355}
.bb{
  font-size:11px;color:#C4A882;background:none;
  border:1px solid #6B4C2E;padding:4px 14px;cursor:pointer;
  font-family:Georgia,serif;border-radius:3px;transition:all .15s;
}
.bb:hover{color:#F0D090;border-color:#C4A882}
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="1100" height="680"></canvas></div>
<div id="bar">
  <span class="bh">✿ Maple Creek Woodland Hotel &nbsp;·&nbsp; ENTER for demo &nbsp;·&nbsp; F for fullscreen</span>
  <div style="display:flex;gap:8px">
    <button class="bb" onclick="triggerDemo()">▶ Demo</button>
    <button class="bb" onclick="toggleSS()">⛶ Fullscreen</button>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════
//  MAPLE CREEK WOODLAND HOTEL  –  Darkclaw live UI  (v2)
//
//  Layout:
//    ┌──── LIBRARY ───┬──────── LOBBY ─────────┬── KITCHEN ──┐
//    │  Kit  Sage     │  Rosie (front desk)     │  Bea  Coder │
//    ├────────────────┴────────────────────────┴─────────────┤
//    │              COMMON HALL  (Pip wanders)                │
//    └────────────────────────────────────────────────────────┘
//
//  All drawing on canvas – no DOM overlays – crisp at any size.
// ═══════════════════════════════════════════════════════════════

const c   = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1100, H = 680;
const HUD_H  = 36;
const ROOM_H = 420;
const HALL_Y = HUD_H + ROOM_H;
const HALL_H = H - HALL_Y;

// ── Palette ──────────────────────────────────────────────────
const P = {
  libFloor:'#9B7855', lobFloor:'#C8AC88', kitFloor:'#8B6840',
  hallFloor:'#7A5C38',
  darkWood:'#3D2010', medWood:'#7B4A20', lightWood:'#C4A060',
  cream:'#FFF8F0', parchment:'#F5E6C8',
  forestGreen:'#3A6B2A', leafGreen:'#5A9B3A',
  gold:'#D4A820', leather:'#8B5A2B',
};

// ── Room bounds ───────────────────────────────────────────────
const LIB = {x:0,   w:340, y:HUD_H, h:ROOM_H};
const LOB = {x:340, w:420, y:HUD_H, h:ROOM_H};
const KIT = {x:760, w:340, y:HUD_H, h:ROOM_H};
const HALL= {x:0,   w:W,   y:HALL_Y,h:HALL_H};

let frame = 0;
const particles = [];
let dlg = {who:'',full:'',idx:0,timer:0};

// ── Agent colors & home positions ────────────────────────────
const COLORS = {rosie:'#E8735A',kit:'#5B8DC8',sage:'#9B7BC8',
                bea:'#D4A020',coder:'#4A8A5A',pip:'#A08060'};
const NAMES  = {rosie:'Rosie',kit:'Kit',sage:'Sage',
                bea:'Bea',coder:'Coder',pip:'Pip'};
function homeOf(id){
  return {
    rosie:{x:540, y:HUD_H+280},
    kit:  {x:130, y:HUD_H+310},
    sage: {x:240, y:HUD_H+270},
    bea:  {x:880, y:HUD_H+300},
    coder:{x:1010,y:HUD_H+340},
    pip:  {x:550, y:HALL_Y+90},
  }[id]||{x:540,y:400};
}
function roomBoundsOf(id){
  if(id==='pip')           return {x1:80,x2:W-80,y1:HALL_Y+30,y2:H-50};
  if(id==='kit'||id==='sage') return {x1:50,x2:330,y1:HUD_H+80,y2:HUD_H+ROOM_H-60};
  if(id==='rosie')         return {x1:360,x2:750,y1:HUD_H+80,y2:HUD_H+ROOM_H-60};
  return                          {x1:780,x2:W-30,y1:HUD_H+80,y2:HUD_H+ROOM_H-60};
}

const agents={};
['rosie','kit','sage','bea','coder','pip'].forEach(id=>{
  const h=homeOf(id);
  agents[id]={id,x:h.x,y:h.y,tx:h.x,ty:h.y,home:{...h},
    phase:Math.random()*Math.PI*2,speech:null,stimer:0,
    status:'idle',stattimer:0,color:COLORS[id],nextMove:Math.random()*200|0};
});

// ── Static note rotations (pre-seeded so they don't flicker) ─
const NOTE_ROT = [0.03,-0.04,0.02,-0.03,0.01,0.05,-0.02];

// ═══════════════════════════════════════════════════════════════
//  DRAW HELPERS
// ═══════════════════════════════════════════════════════════════
function rr(x,y,w,h,r){
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(x,y,w,h,r||0);
  else ctx.rect(x,y,w,h);
  ctx.closePath();
}
function woodFloor(x,y,w,h,col){
  ctx.fillStyle=col; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(0,0,0,0.07)'; ctx.lineWidth=1;
  let off=0;
  for(let py=y+28;py<y+h;py+=28){
    ctx.beginPath();ctx.moveTo(x,py);ctx.lineTo(x+w,py);ctx.stroke();
    for(let px=x+off;px<x+w;px+=80){
      ctx.beginPath();ctx.moveTo(px,py-28);ctx.lineTo(px,py);ctx.stroke();
    }
    off=(off+40)%80;
  }
}

// ─── Bookshelf ────────────────────────────────────────────────
const SPINE=['#B03030','#2858B8','#208850','#B07018','#6828B0',
             '#C03858','#188888','#A04818'];
function bookshelf(x,y,w,h){
  ctx.fillStyle=P.darkWood; ctx.fillRect(x,y,w,h);
  const shelves=Math.floor(h/40);
  for(let s=0;s<shelves;s++){
    const sy=y+8+s*40;
    ctx.fillStyle=P.medWood; ctx.fillRect(x+3,sy+32,w-6,5);
    let bx=x+5;
    for(let b=0;bx<x+w-8;b++){
      const bw=5+(b%3), bh=18+(b%5)*2;
      ctx.fillStyle=SPINE[(s*7+b)%SPINE.length];
      ctx.fillRect(bx,sy+32-bh,bw,bh);
      ctx.fillStyle='rgba(255,255,255,0.12)';
      ctx.fillRect(bx+1,sy+32-bh,1,bh);
      bx+=bw+1;
    }
  }
  ctx.fillStyle='#2A1808';
  ctx.fillRect(x,y,4,h); ctx.fillRect(x+w-4,y,4,h); ctx.fillRect(x,y,w,6);
}

// ─── Armchair ─────────────────────────────────────────────────
function armchair(x,y,col){
  ctx.fillStyle=col||'#7B3B2B';
  rr(x,y,44,52,5); ctx.fill();
  ctx.fillStyle='#D4A060'; rr(x+3,y+30,38,26,4); ctx.fill();
  ctx.fillStyle=col||'#7B3B2B';
  ctx.fillRect(x-7,y+24,9,28); ctx.fillRect(x+42,y+24,9,28);
  ctx.fillStyle=P.darkWood;
  ctx.fillRect(x+2,y+52,7,9); ctx.fillRect(x+35,y+52,7,9);
}

// ─── Candle ───────────────────────────────────────────────────
function candle(x,y){
  ctx.fillStyle='#C0A060'; ctx.fillRect(x-6,y+18,12,5);
  ctx.fillStyle='#FFF8E0'; ctx.fillRect(x-3,y+4,6,16);
  const fl=Math.sin(frame*0.18)*2;
  const g=ctx.createRadialGradient(x,y+fl,0,x,y+fl,11);
  g.addColorStop(0,'rgba(255,220,80,1)');
  g.addColorStop(0.5,'rgba(255,130,20,0.7)');
  g.addColorStop(1,'rgba(255,40,0,0)');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(x,y-4+fl,5,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,170,50,0.05)';
  ctx.beginPath(); ctx.ellipse(x,y+30,32,14,0,0,Math.PI*2); ctx.fill();
}

// ─── Front desk ───────────────────────────────────────────────
function frontDesk(x,y,w,h){
  ctx.fillStyle=P.darkWood; rr(x,y,w,h,4); ctx.fill();
  ctx.fillStyle=P.lightWood; rr(x,y,w,10,4); ctx.fill();
  // ledger
  ctx.fillStyle='#4A3020'; rr(x+18,y-20,55,32,2); ctx.fill();
  ctx.fillStyle='#C8A060';
  [y-15,y-8,y-1].forEach(ly=>ctx.fillRect(x+22,ly,46,2));
  // bell
  ctx.fillStyle='#D4A820';
  ctx.beginPath(); ctx.arc(x+w-38,y-12,11,Math.PI,0); ctx.fill();
  ctx.fillRect(x+w-46,y-12,18,5);
  ctx.fillStyle='#B08010';
  ctx.beginPath(); ctx.arc(x+w-38,y-12,4,0,Math.PI*2); ctx.fill();
}

// ─── Fireplace ────────────────────────────────────────────────
function fireplace(x,y,w,h){
  ctx.fillStyle='#707060'; rr(x,y,w,h,4); ctx.fill();
  ctx.fillStyle='#1A1008'; ctx.fillRect(x+12,y+12,w-24,h-24);
  const t=frame*0.07;
  for(let i=0;i<3;i++){
    const fx=x+w/2+(i-1)*16, fy=y+h-16;
    const fh=28+Math.sin(t+i*1.4)*10;
    const g=ctx.createRadialGradient(fx,fy,0,fx,fy-fh,fh);
    g.addColorStop(0,'rgba(255,220,70,0.95)');
    g.addColorStop(0.4,'rgba(255,100,10,0.7)');
    g.addColorStop(1,'rgba(200,20,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.ellipse(fx,fy-fh/2,12,fh/2,0,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle=P.medWood; ctx.fillRect(x-8,y-12,w+16,14);
  ctx.fillStyle=`rgba(255,140,30,${0.04+Math.sin(t)*0.02})`;
  ctx.beginPath(); ctx.ellipse(x+w/2,y+h+24,90,28,0,0,Math.PI*2); ctx.fill();
}

// ─── Stove ────────────────────────────────────────────────────
function stove(x,y){
  ctx.fillStyle='#252525'; rr(x,y,100,82,6); ctx.fill();
  ctx.fillStyle='#181818'; rr(x,y,100,13,4); ctx.fill();
  [28,72].forEach(bx=>{
    ctx.fillStyle='#383838';
    ctx.beginPath(); ctx.arc(x+bx,y+6,12,0,Math.PI*2); ctx.fill();
    if(frame%6<4){
      ctx.fillStyle='rgba(60,140,255,0.55)';
      ctx.beginPath(); ctx.arc(x+bx,y+6,5,0,Math.PI*2); ctx.fill();
    }
  });
  // pot
  ctx.fillStyle='#484858'; rr(x+20,y-22,32,22,3); ctx.fill();
  ctx.fillStyle='#383848'; ctx.fillRect(x+14,y-24,44,4);
  // steam
  for(let i=0;i<2;i++){
    const sx=x+30+i*14, sy=y-32-((frame*0.4+i*28)%22);
    ctx.strokeStyle='rgba(200,200,200,0.25)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx,sy);
    ctx.bezierCurveTo(sx+6,sy-8,sx-6,sy-16,sx,sy-22); ctx.stroke();
  }
}

// ─── Prep table ───────────────────────────────────────────────
function prepTable(x,y,w,h){
  ctx.fillStyle='#D4B880'; rr(x,y,w,h,4); ctx.fill();
  ctx.fillStyle='#C0A058'; ctx.fillRect(x,y,w,7);
  ctx.fillStyle='#E06020';
  ctx.beginPath(); ctx.arc(x+28,y-11,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#20A050'; ctx.fillRect(x+50,y-17,8,19);
}

// ─── Scholar desk ─────────────────────────────────────────────
function scholarDesk(x,y){
  ctx.fillStyle=P.darkWood; rr(x,y,92,58,4); ctx.fill();
  ctx.fillStyle=P.lightWood; rr(x,y,92,9,4); ctx.fill();
  ctx.fillStyle='#E8D8B8'; rr(x+8,y-24,52,36,2); ctx.fill();
  ctx.fillStyle='#6B4C2E'; ctx.fillRect(x+33,y-24,2,36);
  ctx.fillStyle='#604030';
  for(let l=0;l<5;l++){
    ctx.fillRect(x+10,y-17+l*6,20,1);
    ctx.fillRect(x+37,y-17+l*6,20,1);
  }
  ctx.strokeStyle='#C0A060'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x+64,y-26); ctx.lineTo(x+72,y+6); ctx.stroke();
  ctx.fillStyle='#1A1A3A';
  ctx.beginPath(); ctx.arc(x+76,y-8,8,0,Math.PI*2); ctx.fill();
}

// ─── Plant ────────────────────────────────────────────────────
function plant(x,y,s){
  s=s||1;
  ctx.fillStyle='#C05030';
  ctx.beginPath();
  ctx.moveTo(x-12*s,y); ctx.lineTo(x+12*s,y);
  ctx.lineTo(x+9*s,y+20*s); ctx.lineTo(x-9*s,y+20*s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#3D2010'; ctx.fillRect(x-11*s,y+2,22*s,6*s);
  const lc=[P.leafGreen,P.forestGreen,'#7BC850'];
  for(let i=0;i<4;i++){
    const a=(i/4)*Math.PI*2+frame*0.004;
    const lx=x+Math.cos(a)*14*s, ly=y-14*s+Math.sin(a)*7*s;
    ctx.fillStyle=lc[i%3];
    ctx.beginPath(); ctx.ellipse(lx,ly-10*s,9*s,17*s,a,0,Math.PI*2); ctx.fill();
  }
}

// ─── Bulletin board ───────────────────────────────────────────
const NOTES=[
  {dx:10,dy:10,w:62,h:40,c:'#FFFDE8',t:'Orders\ndue Friday'},
  {dx:78,dy:8, w:52,h:35,c:'#E8F8E8',t:'Supplier\nmeeting 10am'},
  {dx:138,dy:12,w:56,h:38,c:'#F4E8FF',t:'New books\narrived!'},
  {dx:12,dy:58,w:74,h:28,c:'#FFF0E0',t:'Agent log — all well'},
];
function bulletinBoard(x,y,w,h){
  ctx.fillStyle=P.medWood; ctx.fillRect(x-7,y-7,w+14,h+14);
  ctx.fillStyle='#D4A060'; ctx.fillRect(x,y,w,h);
  NOTES.forEach((n,i)=>{
    ctx.save();
    ctx.translate(x+n.dx,y+n.dy);
    ctx.rotate(NOTE_ROT[i]);
    rr(0,0,n.w,n.h,2); ctx.fillStyle=n.c; ctx.fill();
    ctx.fillStyle='#604030'; ctx.font='9px Georgia,serif';
    n.t.split('\n').forEach((l,j)=>ctx.fillText(l,5,13+j*11));
    ctx.restore();
    ctx.fillStyle='#E03020';
    ctx.beginPath(); ctx.arc(x+n.dx+n.w/2,y+n.dy-3,4,0,Math.PI*2); ctx.fill();
  });
}

// ═══════════════════════════════════════════════════════════════
//  DRAW SCENE
// ═══════════════════════════════════════════════════════════════
function drawScene(){
  // HUD
  ctx.fillStyle='#120C04'; ctx.fillRect(0,0,W,HUD_H);
  ctx.strokeStyle='#5A3C20'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,HUD_H-1); ctx.lineTo(W,HUD_H-1); ctx.stroke();
  ctx.fillStyle='#D4A820'; ctx.font='bold 14px Georgia,serif';
  ctx.textBaseline='middle';
  ctx.fillText('✿  MAPLE CREEK WOODLAND HOTEL', 16, HUD_H/2);
  const now=new Date();
  ctx.textAlign='right'; ctx.fillStyle='#8B7355'; ctx.font='11px Georgia,serif';
  ctx.fillText(String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'), W-16, HUD_H/2);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';

  // ── LIBRARY ──────────────────────────────────────────────────
  woodFloor(LIB.x,LIB.y,LIB.w,LIB.h,P.libFloor);
  bookshelf(LIB.x+8,LIB.y+18,36,LIB.h-28);
  bookshelf(LIB.x+LIB.w-46,LIB.y+18,36,LIB.h-60);
  armchair(LIB.x+80,LIB.y+LIB.h-130,'#6B3B2B');
  armchair(LIB.x+174,LIB.y+LIB.h-136,'#4B5B8B');
  ctx.fillStyle=P.darkWood; rr(LIB.x+128,LIB.y+LIB.h-114,38,26,3); ctx.fill();
  candle(LIB.x+147,LIB.y+LIB.h-111);
  // window
  ctx.fillStyle='#283848'; rr(LIB.x+102,LIB.y+28,70,90,4); ctx.fill();
  ctx.strokeStyle='#8090A0'; ctx.lineWidth=3; rr(LIB.x+102,LIB.y+28,70,90,4); ctx.stroke();
  ctx.strokeStyle='#607080'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(LIB.x+137,LIB.y+28); ctx.lineTo(LIB.x+137,LIB.y+118); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(LIB.x+102,LIB.y+73); ctx.lineTo(LIB.x+172,LIB.y+73); ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.font='11px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('THE LIBRARY',LIB.x+LIB.w/2,LIB.y+16); ctx.textAlign='left';
  // wall divider
  ctx.fillStyle='#2D1E0F'; ctx.fillRect(LIB.x+LIB.w-2,LIB.y,4,LIB.h);

  // ── LOBBY ─────────────────────────────────────────────────────
  woodFloor(LOB.x,LOB.y,LOB.w,LOB.h,P.lobFloor);
  frontDesk(LOB.x+40,LOB.y+108,308,52);
  fireplace(LOB.x+LOB.w-118,LOB.y+196,102,92);
  armchair(LOB.x+LOB.w-208,LOB.y+258,'#8B3B2B');
  armchair(LOB.x+LOB.w-86,LOB.y+318,'#6B4020');
  // welcome mat
  ctx.fillStyle='#8B2020'; rr(LOB.x+148,LOB.y+LOB.h-52,124,32,3); ctx.fill();
  ctx.fillStyle='#D4A060'; ctx.font='10px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('WELCOME',LOB.x+210,LOB.y+LOB.h-30); ctx.textAlign='left';
  plant(LOB.x+28,LOB.y+248,0.9);
  plant(LOB.x+LOB.w-26,LOB.y+162,0.8);
  // lantern
  const lg=frame*0.04;
  ctx.fillStyle='#D4A820';
  ctx.beginPath(); ctx.arc(LOB.x+LOB.w/2,LOB.y+34,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(255,200,60,${0.28+Math.sin(lg)*0.05})`;
  ctx.beginPath(); ctx.ellipse(LOB.x+LOB.w/2,LOB.y+58,44,18,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.font='11px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('LOBBY & INN',LOB.x+LOB.w/2,LOB.y+16); ctx.textAlign='left';
  ctx.fillStyle='#2D1E0F'; ctx.fillRect(LOB.x+LOB.w-2,LOB.y,4,LOB.h);

  // ── KITCHEN ───────────────────────────────────────────────────
  woodFloor(KIT.x,KIT.y,KIT.w,KIT.h,P.kitFloor);
  stove(KIT.x+28,KIT.y+78);
  prepTable(KIT.x+38,KIT.y+218,188,46);
  bookshelf(KIT.x+KIT.w-48,KIT.y+18,40,KIT.h-58);
  scholarDesk(KIT.x+KIT.w-178,KIT.y+KIT.h-112);
  // hanging herbs
  for(let i=0;i<4;i++){
    const hx=KIT.x+60+i*54;
    ctx.fillStyle='#3A6020';
    ctx.beginPath(); ctx.moveTo(hx,KIT.y+14); ctx.lineTo(hx-10,KIT.y+36); ctx.lineTo(hx+10,KIT.y+36); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#5A3A18'; ctx.fillRect(hx-1,KIT.y+11,2,7);
  }
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.font='11px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('THE KITCHEN',KIT.x+KIT.w/2,KIT.y+16); ctx.textAlign='left';

  // ── HALLWAY ───────────────────────────────────────────────────
  woodFloor(HALL.x,HALL.y,HALL.w,HALL.h,P.hallFloor);
  ctx.fillStyle='#120C04'; ctx.fillRect(0,HALL.y,W,3);
  // doorway arches
  [[LIB.x+LIB.w/2,84],[LOB.x+LOB.w/2,100],[KIT.x+KIT.w/2,84]].forEach(([ax,aw])=>{
    ctx.fillStyle=P.darkWood; ctx.fillRect(ax-aw/2,HALL.y-4,aw,8);
    ctx.fillStyle='#120C04'; ctx.fillRect(ax-aw/2+6,HALL.y-3,aw-12,6);
  });
  plant(LIB.x+LIB.w-18,HALL.y+28,1.1);
  plant(LOB.x+LOB.w-18,HALL.y+26,1.0);
  plant(KIT.x+8,HALL.y+30,0.9);
  bulletinBoard(58,HALL.y+46,218,102);
  ctx.fillStyle='rgba(255,220,150,0.22)'; ctx.font='11px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('COMMON HALL',W/2,HALL.y+18); ctx.textAlign='left';
  ctx.fillStyle='#100C04'; ctx.fillRect(0,H-3,W,3);
}

// ═══════════════════════════════════════════════════════════════
//  SPRITES  (canvas-drawn – no bitmaps)
// ═══════════════════════════════════════════════════════════════
function head(x,y,skin,eye){
  ctx.fillStyle=skin||'#F5C890';
  ctx.beginPath(); ctx.arc(x,y-30,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=eye||'#3D2010';
  ctx.beginPath(); ctx.arc(x-4,y-32,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+4,y-32,2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#3D2010'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x,y-26,5,0.2,Math.PI-0.2); ctx.stroke();
}

  const y=ag.y+bob;
  ctx.save();

    ctx.beginPath(); ctx.ellipse(ag.x,y+12,24,8,0,0,Math.PI*2); ctx.fill();
  } else if(ag.status==='healing'){
    ctx.fillStyle='rgba(255,80,80,0.11)';
    ctx.beginPath(); ctx.ellipse(ag.x,y+12,24,8,0,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.beginPath(); ctx.ellipse(ag.x,y+24,15,5,0,0,Math.PI*2); ctx.fill();
  ({rosie:drawRosie,kit:drawKit,sage:drawSage,bea:drawBea,coder:drawCoder,pip:drawPip}[ag.id]||drawRosie)(ag.x,y);
  ctx.restore();
}

//  SPEECH BUBBLES  (on canvas – always crisp)
// ═══════════════════════════════════════════════════════════════
function wrapText(text,maxW,font){
  ctx.save(); ctx.font=font||'13px Georgia,serif';
  const words=text.split(' '), lines=[];
  let cur='';
  for(const w of words){
    const t=cur?cur+' '+w:w;
    if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w;}
    else cur=t;
  }
  if(cur) lines.push(cur);
  ctx.restore(); return lines;
}

function speechBubble(x,y,text,color,alpha){
  if(!text||alpha<=0) return;
  const PAD=10,LH=18,MW=185,FONT='13px Georgia,serif';
  ctx.save(); ctx.globalAlpha=Math.min(1,alpha);
  const lines=wrapText(text,MW,FONT);
  const bw=MW+PAD*2, bh=lines.length*LH+PAD*2;
  let bx=x-bw/2, by=y-72-bh;
  bx=Math.max(6,Math.min(W-bw-6,bx));
  by=Math.max(HUD_H+4,by);
  rr(bx,by,bw,bh,8); ctx.fillStyle='#FFF9F0'; ctx.fill();
  ctx.strokeStyle=color; ctx.lineWidth=2; rr(bx,by,bw,bh,8); ctx.stroke();
  const tx=Math.max(bx+14,Math.min(bx+bw-14,x));
  ctx.fillStyle='#FFF9F0';
  ctx.beginPath(); ctx.moveTo(tx-7,by+bh); ctx.lineTo(tx,by+bh+13); ctx.lineTo(tx+7,by+bh); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=color; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(tx-7,by+bh); ctx.lineTo(tx,by+bh+13); ctx.lineTo(tx+7,by+bh); ctx.stroke();
  ctx.strokeStyle='#FFF9F0'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(tx-6,by+bh); ctx.lineTo(tx+6,by+bh); ctx.stroke();
  ctx.fillStyle='#3D2010'; ctx.font=FONT; ctx.textBaseline='top';
  lines.forEach((l,i)=>ctx.fillText(l,bx+PAD,by+PAD+i*LH));
  ctx.restore();
}

//  PARTICLES
// ═══════════════════════════════════════════════════════════════
function burst(x,y,col,n){
  for(let i=0;i<(n||8);i++){
    const a=Math.random()*Math.PI*2, s=0.5+Math.random()*2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,
      col,life:40+Math.random()*30|0,max:60,sz:2+Math.random()*3});
  }
}
function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life/p.max;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

//  AGENT MOVEMENT
// ═══════════════════════════════════════════════════════════════
function randTarget(id){
  const b=roomBoundsOf(id);
  return{x:b.x1+Math.random()*(b.x2-b.x1)|0, y:b.y1+Math.random()*(b.y2-b.y1)|0};
}
function updateAgents(){
  const SPD=0.4;
  for(const [id,ag] of Object.entries(agents)){
    ag.nextMove--;
    if(ag.nextMove<=0){
      const t=(id==='pip'||Math.random()<0.55)?randTarget(id):homeOf(id);
      ag.tx=t.x; ag.ty=t.y;
      ag.nextMove=200+Math.random()*280|0;
    }
    const dx=ag.tx-ag.x, dy=ag.ty-ag.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>2){const s=id==='pip'?SPD*1.4:SPD; ag.x+=dx/dist*s; ag.y+=dy/dist*s;}
    if(ag.stimer>0){ag.stimer-=16; if(ag.stimer<=0){ag.speech=null;ag.stimer=0;}}
    if(ag.stattimer>0){ag.stattimer-=16; if(ag.stattimer<=0){ag.status='idle';ag.stattimer=0;}}
  }
  if(dlg.timer>0){
    dlg.timer-=16;
    if(dlg.idx<dlg.full.length&&frame%2===0) dlg.idx++;
  }
}

const pick=a=>a[Math.floor(Math.random()*a.length)];

function say(id,text,dur){
  const ag=agents[id]; if(!ag)return;
  ag.speech=text; ag.stimer=dur||4000;
  dlg={who:id,full:text,idx:0,timer:dur||4000};
}

function handleEvent(type,aid,data){
  data=data||{};
  if(type==='memory.ingest'||type==='memory.supersede'){
    burst(agents.sage.x,agents.sage.y-20,'#D4B060',6);
    burst(agents.kit.x,agents.kit.y-20,'#5B8DC8',4);
    agents.sage.status='working'; agents.sage.stattimer=3000;
    say('kit',pick(DL.kit.mem),3500);
    setTimeout(()=>say('sage',pick(DL.sage.teach),3500),1200);
  }
  else if(type==='memory.query'||type==='memory.hit'){
    burst(agents.sage.x,agents.sage.y-20,'#9B7BC8',5);
    agents.sage.status='working'; agents.sage.stattimer=2000;
  }
  else if(type==='agent.task.start'){
    const a=agents[aid]||agents.rosie;
    a.status='working'; a.stattimer=4000;
    const ag=aid||'rosie';
    say(ag,pick((DL[ag]||DL.bea).busy||DL.bea.busy),3000);
  }
  else if(type==='agent.task.done'){
    const a=agents[aid]||agents.rosie;
    burst(a.x,a.y-20,'#80C8F0',8); a.status='idle';
    say(aid||'rosie',pick((DL[aid]||DL.rosie).task||DL.rosie.task),3000);
  }
  else if(type==='heal.triggered'){
    const a=agents[aid]||agents.pip;
    a.status='healing'; a.stattimer=6000;
    agents.pip.status='working'; agents.pip.stattimer=5000;
    agents.pip.tx=a.x; agents.pip.ty=a.y;
    burst(agents.pip.x,agents.pip.y,'#E86868',10);
    say('pip',pick(DL.pip.warn),4000);
  }
  else if(type==='heal.success'){
    const a=agents[aid]||agents.pip;
    a.status='idle'; agents.pip.status='idle';
    burst(a.x,a.y-20,'#80E090',10); burst(a.x,a.y-20,'#D4A820',6);
    say('pip',pick(DL.pip.ok),3500);
  }
  else if(type==='teach.win'){
    burst(agents.sage.x,agents.sage.y-20,'#F0E040',10);
    burst(agents.sage.x,agents.sage.y-20,'#C0B0F0',6);
    say('sage',pick(DL.sage.teach),4000);
  }
  else if(type==='system.start'){
    say('rosie','Maple Creek is open — welcome!',4000);
  }
  else if(type==='agent.started'){
    if(agents[aid]) agents[aid].status='idle';
  }
  else if(type==='health.ok'){
    agents.pip.status='idle';
  }
}

  ()=>handleEvent('agent.task.start','bea',{}),
  ()=>handleEvent('heal.triggered','kit',{}),
  ()=>handleEvent('heal.success','kit',{}),
  ()=>handleEvent('teach.win','sage',{accuracy:0.94}),
  ()=>handleEvent('agent.task.done','coder',{}),
  ()=>say('sage','Every question answered builds the map. Keep asking.',4500),
  ()=>say('pip','All floors clean, all agents running. A fine day at the inn!',4000),
];
let di=0;
function triggerDemo(){DEMOS[di++%DEMOS.length]();}

// ═══════════════════════════════════════════════════════════════
//  WEBSOCKET
// ═══════════════════════════════════════════════════════════════
function tryWS(){
  try{
    const p=location.protocol==='https:'?'wss:':'ws:';
    const ws=new WebSocket(`${p}//${location.host}/ws`);
    ws.onopen=()=>say('pip','Connected to Darkclaw — live events active!',3500);
    ws.onmessage=e=>{try{const ev=JSON.parse(e.data);handleEvent(ev.type,ev.agent_id,ev.data||{});}catch(_){}};
    ws.onclose=()=>setTimeout(tryWS,5000);
  }catch(_){}
}

// ═══════════════════════════════════════════════════════════════
//  SCREENSAVER
// ═══════════════════════════════════════════════════════════════
let ss=false;
function toggleSS(){
  ss=!ss;
  document.getElementById('bar').style.display=ss?'none':'';
  document.getElementById('wrap').style.cssText=
    ss?'position:fixed;inset:0;z-index:9999;border:none;box-shadow:none':'position:relative;box-shadow:0 8px 48px rgba(0,0,0,.7);border:3px solid #6B4C2E';
  c.style.cssText=ss?'width:100vw;height:100vh;display:block':'';
}

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop(){
  frame++;
  ctx.clearRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  drawScene();
  drawParticles();
  const sorted=Object.values(agents).sort((a,b)=>a.y-b.y);
  sorted.forEach(drawAgent);
  sorted.forEach(ag=>{
    if(ag.speech&&ag.stimer>0)
      speechBubble(ag.x,ag.y-35,ag.speech,ag.color,Math.min(1,ag.stimer/400));
  });
  drawDialog();
  updateAgents();
  requestAnimationFrame(loop);
}

loop();
setTimeout(()=>say('rosie','Welcome to Maple Creek! The inn is always open.',4500),1000);
tryWS();
document.addEventListener('keydown',e=>{
  if(e.key==='Enter') triggerDemo();
  if(e.key==='f'||e.key==='F') toggleSS();
  if(e.key==='Escape'&&ss) toggleSS();
});
window.DarkclawDaydream={handleEvent,say,triggerDemo};
</script>
</body>
</html>
