name: Darkclaw CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Syntax check all Python
        run: python -m py_compile core/*.py memory/*.py agents/*.py

      # The real gate. This step previously ran `python memory/darkclaw_core.py`
      # — a demo script, not the suite — so the tests in tests/ never gated a
      # single push, and CI sat red for weeks on a hardcoded /home/claude path
      # instead of telling us anything about the code.
      - name: Run test suite
        env:
          # CI must never inherit a developer's terminal opt-in, and the DB
          # must not assume a writable $HOME.
          DARKCLAW_TERMINAL: "0"
          DARKCLAW_DB: /tmp/darkclaw-ci.db
        run: python -m pytest tests/ -q
