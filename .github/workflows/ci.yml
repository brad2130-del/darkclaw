name: Darkclaw CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Darkclaw tests
        run: python memory/darkclaw_core.py
      - name: Syntax check all Python
        run: python -m py_compile core/*.py memory/*.py agents/*.py
      - name: Check imports
        run: python -c "from core.event_bus import bus; print('event_bus ok')"
